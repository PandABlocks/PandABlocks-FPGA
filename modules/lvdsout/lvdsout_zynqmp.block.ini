[.]
description: LVDS output
entity: lvdsout

[OCT_DELAY]
type: param uint 7
description: Number of 1/8 ticks to delay (range 0-7)
if-option: fine_delay

[FINE_DELAY]
type: param uint 511
description: Fine delay (range 0-511)
initial_value: 255
if-option: fine_delay
wstb: true

[FINE_DELAY_COMPENSATED]
type: read uint 511
description: Fine delay readout considering voltage/time compensation

[INITIAL_ONE_NS]
type: read uint 511
description: Initial fine delay readout for a delay of 1ns

[VAL]
type: bit_mux
description: LVDS output value
