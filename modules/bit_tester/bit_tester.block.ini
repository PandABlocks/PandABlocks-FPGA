[.]
description: Pseudo-random bit tester
entity: bit_tester

[ENABLE]
type: bit_mux
description: Enable bit tester

[TRIG]
type: bit_mux
description: On rising-edge, last input and output bits are compared and a new bit produced

[OUTPUT]
type: bit_out
description: Output bit stream

[INPUT]
type: bit_mux
description: Input bit stream

[ERRORS]
type: read uint
description: Number of discrepancies between output and input
