[.]
description: Separately Terminated Digital Input/Output
entity: st_dio
extension: st_dio
extra_ios: io,inout
gen_wrapper: true
block_suffixes: IN OUT

[IN.TERM]
type: param enum
extension: term
description: Select input termination
0: High-Z
1: 50-ohm

[IN.VAL]
type: bit_out
description: DIO input value

[OUT.VAL]
type: bit_mux
description: DIO output value

[OUT.DIR_REG]
description:
type: extension_write

[OUT.DIR]
type: param enum
description: DIO direction
extension: dir
extension_write: OUT.DIR_REG
0: Input
1: Output
