on:
  workflow_call:

jobs:
  make_boot:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: zynq
            app: PandABox-no-fmc
    runs-on:
      group: iris_runners
    container:
      image: docker.io/shihabdls/pandablocks-container-extension:v2.3
      options: --privileged

    steps:
      # Necessary to find action.yml
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          path: repos/PandABlocks-fpga
          fetch-depth: 0

      - name: Checkout PandABlocks-rootfs
        uses: actions/checkout@v4
        with:
          repository: PandABlocks/PandABlocks-rootfs
          path: repos/PandABlocks-rootfs
          fetch-depth: 0
      
      # Give runner perms
      - name: Give runner build perms
        id: give_perms
        run: |
          sudo mkdir /build
          sudo chmod -R 777 /build
          sed -i 's@/repos/PandABlocks-rootfs@/__w/PandABlocks-FPGA/PandABlocks-FPGA/repos/PandABlocks-rootfs@g' repos/PandABlocks-fpga/CONFIG.example

        # Generate bootable image
      - name: Make boot
        id: make_boot
        run: |
          cd repos/PandABlocks-fpga && ln -s CONFIG.example CONFIG && make boot APP_NAME=${{ matrix.app }} && echo "done"
          exit

      # Artifacts
      - name: Upload boot
        uses: actions/upload-artifact@v2
        with:
          name: zpkgs
          path: /build/boot*.zip
