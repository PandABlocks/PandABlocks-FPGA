on:
  workflow_call:
    secrets:
      VIVADO_S3_ACCESS_KEY_ID:
        required: true
      VIVADO_S3_SECRET_ACCESS_KEY:
        required: true

jobs:
  make_boot:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: zynq
            app: PandABox-no-fmc
          - platform: zynqmp
            app: xu5_st1-no-fmc
    runs-on:
      group: iris_runners
    container:
      image: summerwind/actions-runner:latest
      volumes:
        - ${{github.workspace}}/repos:/repos
        - ${{github.workspace}}/build:/build
        - ${{github.workspace}}/scratch/Xilinx:/scratch/Xilinx

    steps:
      # Necessary to find action.yml
      - name: Checkout Source
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      # Run action.yml
      - name: Checkout and install rclone
        uses: ./.github/actions/setupenv

      - name: Print volumes
        run: |
          cd /repos
          ls -l

      # S3 bucket
      - name: Mount Vivado S3 bucket
        run: sudo bash PandABlocks-fpga/.github/scripts/mount-s3-bucket.sh ${{ secrets.VIVADO_S3_ACCESS_KEY_ID }}

      - name: Sleep
        run: sleep 5000
      
      - name: Verify S3 Bucket Mounting
        run: ls -l /scratch/Xilinx
        
      - name: boot step
        run: cd PandABlocks-fpga && ln -s CONFIG.example CONFIG && make boot APP_NAME=${{ matrix.app }}

      # Artifacts
      - name: Upload boot
        uses: actions/upload-artifact@v2
        with:
          name: zpkgs
          path: ./build/boot*.zip
