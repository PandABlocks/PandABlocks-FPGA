on:
  workflow_call:

jobs:
  make_boot:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: zynq
            app: PandABox-no-fmc
          - platform: zynqmp
            app: xu5_st1-no-fmc
    runs-on:
      group: iris_runners
    container:
      image: docker.io/shihabdls/pandablocks-container-extension:v2.5
      options: --privileged

    steps:
      # Necessary to find action.yml
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          path: repos/PandABlocks-fpga
          fetch-depth: 0

      - name: Checkout rootfs, give perms, and adjust path
        uses: ./repos/PandABlocks-fpga/.github/actions/setupenv

        # Generate bootable image
      - name: Make boot
        id: make_boot
        continue-on-error: true
        timeout-minutes: 40
        run: |
          echo "timeout=false" >> $GITHUB_OUTPUT
          if [-f boot*.zip]; then
            echo "exist"
          else
            echo "not exist"
          fi
          cd repos/PandABlocks-fpga && ln -s CONFIG.example CONFIG && make boot WORK_DIR=/__w/PandABlocks-FPGA/PandABlocks-FPGA/repos/PandABlocks-rootfs APP_NAME=${{ matrix.app }}
          echo "timeout=true" >> $GITHUB_OUTPUT

      
      - name: Check if make boot completes
        if: ${{ steps.make_boot.outputs.timeout == 'false'}}
        run: exit 1

      # Artifacts
      - name: Upload boot
        if: ${{ steps.make_boot.outputs.timeout == 'true'}}
        uses: actions/upload-artifact@v2
        with:
          name: zpkgs
          path: /build/boot*.zip
