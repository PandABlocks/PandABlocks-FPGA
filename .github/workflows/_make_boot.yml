on:
  workflow_call:

jobs:
  make_boot:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: zynq
            app: PandABox-no-fmc
    runs-on:
      group: iris_runners
    container:
      image: docker.io/shihabdls/pandablocks-container-extension:v2.5
      options: --privileged

    steps:
      # Necessary to find action.yml
#      - name: Checkout Source
#        uses: actions/checkout@v4
#        with:
#          path: repos/PandABlocks-fpga
#          fetch-depth: 0

#      - name: Checkout rootfs, give perms, and adjust path
#        uses: ./repos/PandABlocks-fpga/.github/actions/setupenv

        # Generate bootable image
      - name: Make boot
        id: make_boot
        continue-on-error: true
        timeout-minutes: 1
        run: |
          echo "timeout=false" >> $GITHUB_OUTPUT

      - name: check output
        run: echo "${{steps.make_boot.outputs.timeout}}"

      # Artifacts
      - name: Upload boot
        if: ${{ steps.make_boot.outputs.timeout }}==true
        uses: actions/upload-artifact@v2
        with:
          name: zpkgs
          path: /build/boot*.zip
