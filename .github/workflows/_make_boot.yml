on:
  workflow_call:
    secrets:
      VIVADO_S3_ACCESS_KEY_ID:
        required: true
      VIVADO_S3_SECRET_ACCESS_KEY:
        required: true

jobs:
  make_boot:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: zynq
            app: PandABox-no-fmc
          - platform: zynqmp
            app: xu5_st1-no-fmc
    runs-on:
      group: iris_runners
    container:
      image: docker.io/shihabdls/pandablocks-container-extension:v2.0
      options: --privileged
      volumes:
        - ${{github.workspace}}/repos:/repos
        - ${{github.workspace}}/build:/build

    steps:
      # Give runner perms
      - name: Give runner build perms
        run: |
          sudo chmod 777 /build
          sudo chmod 777 /repos

      # Necessary to find action.yml
      - name: Checkout Source
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      # Run action.yml
      - name: Checkout repos
        uses: ./.github/actions/setupenv
      
      # Generate boot image
      - name: Make boot
        run: cd repos/PandABlocks-fpga && ln -s CONFIG.example CONFIG && make boot APP_NAME=${{ matrix.app }}

      # Artifacts
      - name: Upload boot
        uses: actions/upload-artifact@v2
        with:
          name: zpkgs
          path: ./build/boot*.zip
