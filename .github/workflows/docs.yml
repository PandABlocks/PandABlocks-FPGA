name: Docs CI

on:
  push:
    branches:
      - main
      - docs
    tags:
      - '*'
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Avoid git conflicts when tag and branch pushed at same time
        if: github.ref_type == 'tag'
        run: sleep 60

      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Need this to get version number from last tag
          fetch-depth: 0

      # PandABlocks-FPGA is an HDL project, not a Python/uv project, so we install
      # mystmd directly with npm rather than via `uv run tox -e docs`. The build
      # command itself (`cd docs && myst build --html`) matches the template.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install MyST
        run: npm install -g mystmd@1.10.1

      - name: Sanitize ref name for docs version
        run: echo "DOCS_VERSION=${GITHUB_REF_NAME//[^A-Za-z0-9._-]/_}" >> $GITHUB_ENV

      # BASE_URL is required so assets/links resolve under the versioned Pages
      # sub-path (https://pandablocks.github.io/PandABlocks-FPGA/$DOCS_VERSION/).
      # The per-block docs are pulled in out-of-tree from ../modules/*/*_doc.md, so
      # the whole repo is checked out (default) — no extra steps needed.
      - name: Build docs
        env:
          BASE_URL: /PandABlocks-FPGA/${{ env.DOCS_VERSION }}
        run: |
          cd docs
          myst build --html

      # Drop the ~135 MB templates/ dir (downloaded book-theme node sources, a
      # build-time cache) before uploading. We keep docs/_build as the artifact
      # root so the archive retains the intermediate html/ directory.
      - name: Remove build cache from artifact
        run: rm -rf docs/_build/templates

      - name: Upload built docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: docs/_build

      - name: Move to versioned directory
        run: mv docs/_build/html .github/pages/$DOCS_VERSION

      - name: Write switcher.json
        run: python3 .github/pages/make_switcher.py --add $DOCS_VERSION ${{ github.repository }} .github/pages/switcher.json

      - name: Publish Docs to gh-pages
        if: github.ref_type == 'tag' || github.ref_name == 'main' || github.ref_name == 'docs'
        # We pin to the SHA, not the tag, for security reasons.
        # https://docs.github.com/en/actions/learn-github-actions/security-hardening-for-github-actions#using-third-party-actions
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .github/pages
          keep_files: true
