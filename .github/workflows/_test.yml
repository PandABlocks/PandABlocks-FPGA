on:
  workflow_call:
    inputs:
      matrix:
        required: true
        type: string
    outputs:
      run_id: 
        value: ${{ jobs.test.outputs.run_id }}

jobs:
  test:
    strategy:
      fail-fast: false
      # Using generated matrix from previous job
      #matrix: ${{fromJSON(inputs.matrix)}}
      matrix:
        modules: [fail]
    outputs:
      run_id: ${{steps.run_id_step.outputs.run_id}} 
    runs-on:
      group: iris_runners
    container:
        image: docker.io/shihabdls/pandablocks-container-extension:v2.5
        options: --privileged

    steps:
      # Necessary to find action.yml
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          path: repos/PandABlocks-fpga
          fetch-depth: 0

      - name: Checkout rootfs, give perms, and adjust path
        uses: ./repos/PandABlocks-fpga/.github/actions/setupenv

      # Run tests
      - name: Make python and hdl tests
        id: python_hdl_tests
        run: cd repos/PandABlocks-fpga && ln -s CONFIG.example CONFIG && make WORK_DIR=/__w/PandABlocks-FPGA/PandABlocks-FPGA hdl_test MODULES="${{matrix.modules}}" 

      - name: Output run ID
        id: run_id_step 
        if: ${{ always() }}
        run: echo "run_id=${{ github.run_id }}" >> "$GITHUB_OUTPUT"
        
