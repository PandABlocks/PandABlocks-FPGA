on:
  workflow_call:

jobs:
  make_zpkg:
    strategy:
      fail-fast: false
      matrix:
        app: [
          "PandABox-no-fmc",
          "PandABox-fmc_24vio",
          "PandABox-fmc_acq427",
          "PandABox-fmc_acq430",
          "PandABox-fmc_lback-sfp_lback",
          "ZedBoard-no-fmc",
          ]
    runs-on:
      group: iris_runners
    container:
      image: docker.io/shihabdls/pandablocks-container-extension:v2.3
      options: --privileged

    steps:
      # Necessary to find action.yml
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          path: repos/PandABlocks-fpga
          fetch-depth: 0

      - name: Checkout PandABlocks-rootfs
        uses: actions/checkout@v4
        with:
          repository: PandABlocks/PandABlocks-rootfs
          path: repos/PandABlocks-rootfs
          fetch-depth: 0
      
      # Give runner perms
      - name: Give runner build perms
        id: give_perms
        run: |
          sudo mkdir /build
          sudo chmod -R 777 /build
          sed -i 's@/repos/PandABlocks-rootfs@/__w/PandABlocks-FPGA/PandABlocks-FPGA/repos/PandABlocks-rootfs@g' repos/PandABlocks-fpga/CONFIG.example

      - name: build carrier_ip and zpkg
        id: make_zpkg
        run: |
          cd repos/PandABlocks-fpga && ln -s CONFIG.example CONFIG && make carrier_ip APP_NAME=${{ matrix.app }} && make zpkg APP_NAME=${{ matrix.app }} && echo "done"
          exit

      # Artifacts
      - name: Upload zpkg
        uses: actions/upload-artifact@v2
        with:
          name: zpkgs
          path: /build/panda-fpga@*.zpg