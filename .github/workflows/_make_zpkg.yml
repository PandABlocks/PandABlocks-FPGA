on:
  workflow_call:

jobs:
  make_zpkg:
    strategy:
      fail-fast: false
      matrix:
        app: [
              "PandABox-no-fmc"
              ]
    runs-on:
      group: iris_runners
    container:
      image: docker.io/shihabdls/pandablocks-container-extension:v1.7
      options: --privileged

    steps:
      # Give runner perms
      - name: Give runner build perms
        id: give_perms
        run: |
          sudo mkdir /build
          sudo mkdir /repos
          sudo chmod -R 777 /build
          cd /repos

      # Necessary to find action.yml
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          path: ${{github.workspace}}/repos/PandABlocks-fpga
          # require history to get back to last tag for version number of branches
          fetch-depth: 0

      - name: Checkout PandABlocks-rootfs
        uses: actions/checkout@v4
        with:
          repository: PandABlocks/PandABlocks-rootfs
          path: ${{github.workspace}}/repos/PandABlocks-rootfs
          fetch-depth: 0

      - name: build carrier_ip and zpkg
        id: make_zpkg
        run: |
          ls
          pwd
          cd /PandABlocks-fpga && ln -s CONFIG.example CONFIG && make carrier_ip APP_NAME=${{ matrix.app }} && make zpkg APP_NAME=${{ matrix.app }} && echo "done"
          exit

      # Artifacts
      - name: Upload zpkg
        uses: actions/upload-artifact@v2
        with:
          name: zpkgs
          path: ./build/panda-fpga@*.zpg