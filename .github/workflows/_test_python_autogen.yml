on:
  workflow_call:

# python + autogen tests on a plain GitHub runner, driven through uv (which provisions
# the harness deps — numpy / jinja2 / matplotlib / cocotb — from pyproject.toml +
# uv.lock).
jobs:
  test_python_autogen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Python + autogen tests
        run: |
          set -euo pipefail
          sudo mkdir -p /build && sudo chmod -R 777 /build
          ln -s CONFIG.example CONFIG
          uv run --locked make python_tests
          uv run --locked make autogen
