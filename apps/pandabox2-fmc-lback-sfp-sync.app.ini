[.]
description:
    Standard set of PandABox2 blocks with:
        - FMC Loopback modules
        - PandA synchroniser on SFP1 and SFP2
target: pandabox2
options: fine_delay
includes: common_soft_blocks.include.ini

[FMC_LBACK]
module: fmc_loopback

[SFP1_SYNC]
module: sfp_panda_sync
ini: sfp_panda_sync_us.block.ini
site: sfp 1

[SFP2_SYNC]
module: sfp_panda_sync
ini: sfp_panda_sync_us.block.ini
site: sfp 2
